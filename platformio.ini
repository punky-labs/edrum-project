; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = firmware/src/

[env:xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_resetmethod = nodemcu
upload_port = COM9
monitor_rts = 0
monitor_dtr = 0
build_flags = 
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D CFG_TUD_MIDI=1
lib_deps = 
	h2zero/NimBLE-Arduino@1.4.3
	max22/ESP32-BLE-MIDI@^0.3.2

; RETIRED (Sensing rewrite Step 0/Step 1): the RP2040 + MCP3008 path cannot run
; the `adc_continuous` DMA sampling layer the new engine requires (different ADC,
; ~2 kHz, no continuous DMA equivalent). Superseded by [env:xiao_esp32s3_head].
; Kept here, commented out, for historical reference only — do not re-enable
; without porting Layer 1 (AdcSampler) to a platform-appropriate sampler.
; [env:xiao_rp2040]
; platform = https://github.com/Seeed-Studio/platform-seeedboards.git
; board = seeed-xiao-rp2040
; framework = arduino
; monitor_speed = 115200
; upload_protocol = picotool
; upload_port = COM10
; board_build.filesystem = littlefs
; board_build.filesystem_size = 0.5m
; board_build.flash_size = 2m
; extra_scripts = pre:firmware/scripts/increment_build.py
; build_src_filter =
; 	-<*>
; 	+<main_rp2040.cpp>
; 	+<config/Config.cpp>
; 	+<midi/SysEx.cpp>
; 	+<pdrum/pdrum.cpp>
; build_flags = -D USE_TINYUSB
; lib_deps =
; 	fortyseveneffects/MIDI Library
; 	adafruit/Adafruit TinyUSB Library
; 	adafruit/Adafruit NeoPixel@^1.12.3
; 	adafruit/Adafruit MCP3008@^1.3.3

[env:xiao_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
;upload_port = COM12
build_src_filter = 
	-<*>
	+<test.cpp>
build_unflags =
  -DARDUINO_USB_MODE=1
build_flags =
  -DARDUINO_USB_MODE=0
lib_deps = 
	fortyseveneffects/MIDI Library
	adafruit/Adafruit TinyUSB Library

; ADC sample-rate benchmark. Uses built-in USB-CDC serial (NOT TinyUSB MIDI),
; so Serial.printf output appears in the monitor. Requires BENCH_ADC defined
; at the top of test.cpp (it is, by default).
[env:xiao_adc_bench]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
;upload_port = COM9
build_src_filter = 
	-<*>
	+<test.cpp>
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:xiao_esp32s3_head]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_port = COM13
monitor_rts = 0
monitor_dtr = 0
board_build.filesystem = littlefs
board_build.filesystem_size = 0.5m
build_src_filter =
    -<*>
    +<main_esp32s3.cpp>
    +<config/Config.cpp>
    +<midi/SysEx.cpp>
    +<sensing/pdrum2/PDrum2Trigger.cpp>
    +<sensing/sampling/AdcSampler.cpp>
    +<sensing/sampling/SampleStream.cpp>
build_unflags =
    -D ARDUINO_USB_MODE=1
;    -D ARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    -D ARDUINO_USB_MODE=0
;    -D ARDUINO_USB_CDC_ON_BOOT=0
lib_deps =
    fortyseveneffects/MIDI Library
    adafruit/Adafruit TinyUSB Library